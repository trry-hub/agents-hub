<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="__CSP__">
  <title>AI CLI Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header / CLI Selector */
    .header {
      padding: 8px 10px;
      border-bottom: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.3));
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .cli-select {
      flex: 1;
      padding: 4px 8px;
      background: var(--vscode-dropdown-background);
      color: var(--vscode-dropdown-foreground);
      border: 1px solid var(--vscode-dropdown-border);
      border-radius: 4px;
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      outline: none;
    }

    .cli-select:focus {
      border-color: var(--vscode-focusBorder);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--vscode-errorForeground);
      flex-shrink: 0;
    }

    .status-dot.installed {
      background: #4ec9b0;
    }

    .terminal-btn {
      padding: 3px 8px;
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      white-space: nowrap;
    }

    .terminal-btn:hover {
      background: var(--vscode-button-secondaryHoverBackground);
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 90%;
      padding: 6px 10px;
      border-radius: 8px;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.user {
      align-self: flex-end;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border-radius: 8px 8px 2px 8px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--vscode-editorWidget-background, var(--vscode-textCodeBlock-background, rgba(128,128,128,0.1)));
      color: var(--vscode-editor-foreground);
      border-radius: 8px 8px 8px 2px;
    }

    .message.error {
      align-self: flex-start;
      background: var(--vscode-inputValidation-errorBackground, rgba(200,50,50,0.2));
      color: var(--vscode-errorForeground, #f44);
      border-radius: 8px 8px 8px 2px;
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: var(--vscode-descriptionForeground);
      font-size: 12px;
      padding: 4px 0;
    }

    .message code {
      font-family: var(--vscode-editor-font-family);
      background: var(--vscode-textCodeBlock-background, rgba(0,0,0,0.2));
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }

    .message pre {
      background: var(--vscode-editor-background);
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 4px 0;
      border: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.2));
    }

    .message pre code {
      background: none;
      padding: 0;
    }

    /* Input Area */
    .input-area {
      padding: 8px 10px;
      border-top: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.3));
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .input-field {
      flex: 1;
      padding: 6px 10px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 4px;
      font-family: inherit;
      font-size: inherit;
      outline: none;
      resize: none;
      min-height: 32px;
      max-height: 120px;
    }

    .input-field:focus {
      border-color: var(--vscode-focusBorder);
    }

    .input-field::placeholder {
      color: var(--vscode-input-placeholderForeground);
    }

    .send-btn, .stop-btn {
      width: 36px;
      height: 32px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
    }

    .send-btn:hover {
      background: var(--vscode-button-hoverBackground);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stop-btn {
      background: var(--vscode-errorForeground, #c00);
      color: #fff;
      display: none;
    }

    .stop-btn.visible {
      display: flex;
    }

    .stop-btn:hover {
      opacity: 0.8;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--vscode-foreground);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Scrollbar */
    .messages::-webkit-scrollbar {
      width: 6px;
    }
    .messages::-webkit-scrollbar-thumb {
      background: var(--vscode-scrollbarSlider-background);
      border-radius: 3px;
    }
    .messages::-webkit-scrollbar-thumb:hover {
      background: var(--vscode-scrollbarSlider-hoverBackground);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--vscode-descriptionForeground);
      gap: 8px;
      padding: 20px;
      text-align: center;
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot" title="CLI not detected"></div>
    <select class="cli-select" id="cliSelect">
      <option value="">Loading...</option>
    </select>
    <button class="terminal-btn" id="terminalBtn" title="Open in Terminal">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M6 11L2 8l4-3v6zm4-3v1h4V8h-4zm-2 4h2V7H8v5z"/>
      </svg>
    </button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
        <path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/>
      </svg>
      <p>Select an AI CLI tool above, then type a message to start a session.</p>
      <p>Supported: Claude Code, Gemini CLI, Codex, Cursor Agent</p>
    </div>
  </div>

  <div class="input-area">
    <textarea class="input-field" id="inputField" placeholder="Type your message..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" title="Send">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M1.5 1.3l13 6.7-13 6.7V9.5L10 8 1.5 6.5V1.3z"/>
      </svg>
    </button>
    <button class="stop-btn" id="stopBtn" title="Stop">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <rect x="3" y="3" width="10" height="10" rx="1"/>
      </svg>
    </button>
  </div>

  <script nonce="__NONCE__">
    const vscode = acquireVsCodeApi();
    const cliSelect = document.getElementById('cliSelect');
    const messagesEl = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDot = document.getElementById('statusDot');
    const terminalBtn = document.getElementById('terminalBtn');

    let profiles = [];
    let isRunning = false;
    let currentAssistantMsg = null;

    // Restore state
    const state = vscode.getState();
    if (state) {
      profiles = state.profiles || [];
      if (state.messages) {
        emptyState.style.display = 'none';
        state.messages.forEach(m => appendMessage(m.role, m.content, false));
      }
    }

    // Messages from extension
    window.addEventListener('message', event => {
      const msg = event.data;
      switch (msg.command) {
        case 'profiles':
          handleProfiles(msg.profiles);
          break;
        case 'output':
          handleOutput(msg.text, msg.isError);
          break;
        case 'sessionEnd':
          handleSessionEnd(msg.exitCode);
          break;
        case 'error':
          appendMessage('error', msg.text);
          break;
        case 'stopped':
          handleStopped();
          break;
      }
    });

    function handleProfiles(list) {
      profiles = list;
      const current = cliSelect.value;
      cliSelect.innerHTML = '';
      list.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = (p.installed ? '✓ ' : '✗ ') + p.name;
        opt.disabled = !p.installed;
        cliSelect.appendChild(opt);
      });
      if (current && list.find(p => p.id === current)) {
        cliSelect.value = current;
      }
      updateStatus();
      saveState();
    }

    function updateStatus() {
      const selected = profiles.find(p => p.id === cliSelect.value);
      if (selected && selected.installed) {
        statusDot.classList.add('installed');
        statusDot.title = selected.name + ' is installed';
      } else {
        statusDot.classList.remove('installed');
        statusDot.title = selected ? selected.name + ' not found' : 'No CLI selected';
      }
    }

    cliSelect.addEventListener('change', updateStatus);

    // Send
    sendBtn.addEventListener('click', sendMessage);
    inputField.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    inputField.addEventListener('input', () => {
      inputField.style.height = 'auto';
      inputField.style.height = Math.min(inputField.scrollHeight, 120) + 'px';
    });

    function sendMessage() {
      const text = inputField.value.trim();
      if (!text || !cliSelect.value) return;

      emptyState.style.display = 'none';
      appendMessage('user', text);
      inputField.value = '';
      inputField.style.height = 'auto';

      setRunning(true);
      vscode.postMessage({
        command: 'send',
        cliId: cliSelect.value,
        text: text,
      });
    }

    // Stop
    stopBtn.addEventListener('click', () => {
      vscode.postMessage({ command: 'stop' });
    });

    // Terminal
    terminalBtn.addEventListener('click', () => {
      if (cliSelect.value) {
        vscode.postMessage({ command: 'openTerminal', cliId: cliSelect.value });
      }
    });

    function setRunning(running) {
      isRunning = running;
      sendBtn.style.display = running ? 'none' : 'flex';
      stopBtn.classList.toggle('visible', running);
      if (running) {
        // Add thinking indicator
        currentAssistantMsg = document.createElement('div');
        currentAssistantMsg.className = 'message assistant';
        currentAssistantMsg.innerHTML = '<span class="spinner"></span> Thinking...';
        messagesEl.appendChild(currentAssistantMsg);
        scrollToBottom();
      }
    }

    function handleOutput(text, isError) {
      if (isError) {
        if (currentAssistantMsg) {
          currentAssistantMsg.remove();
          currentAssistantMsg = null;
        }
        appendMessage('error', text);
        return;
      }

      if (currentAssistantMsg) {
        // Replace spinner with actual content
        const existing = currentAssistantMsg.getAttribute('data-content') || '';
        const content = existing + text;
        currentAssistantMsg.setAttribute('data-content', content);
        currentAssistantMsg.innerHTML = formatOutput(content);
      } else {
        currentAssistantMsg = document.createElement('div');
        currentAssistantMsg.className = 'message assistant';
        currentAssistantMsg.setAttribute('data-content', text);
        currentAssistantMsg.innerHTML = formatOutput(text);
        messagesEl.appendChild(currentAssistantMsg);
      }
      scrollToBottom();
    }

    function handleSessionEnd(exitCode) {
      setRunning(false);
      if (currentAssistantMsg) {
        const content = currentAssistantMsg.getAttribute('data-content') || '';
        if (!content) {
          currentAssistantMsg.innerHTML = `<span style="color:var(--vscode-descriptionForeground)">Session ended (exit code: ${exitCode})</span>`;
        }
        currentAssistantMsg = null;
      }
      if (exitCode !== 0) {
        appendMessage('system', `Process exited with code ${exitCode}`);
      }
      saveState();
    }

    function handleStopped() {
      setRunning(false);
      if (currentAssistantMsg) {
        const content = currentAssistantMsg.getAttribute('data-content') || '';
        if (!content) {
          currentAssistantMsg.remove();
        }
        currentAssistantMsg = null;
      }
      appendMessage('system', 'Stopped.');
      saveState();
    }

    function appendMessage(role, content, shouldSave = true) {
      const el = document.createElement('div');
      el.className = 'message ' + role;
      if (role === 'assistant') {
        el.setAttribute('data-content', content);
        el.innerHTML = formatOutput(content);
      } else {
        el.textContent = content;
      }
      messagesEl.appendChild(el);
      scrollToBottom();
      if (shouldSave) saveState();
    }

    function formatOutput(text) {
      // Simple formatting: code blocks and inline code
      let html = escapeHtml(text);
      // Code blocks: ```...```
      html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        return '<pre><code>' + code.trim() + '</code></pre>';
      });
      // Inline code: `...`
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function saveState() {
      const msgs = [];
      messagesEl.querySelectorAll('.message').forEach(el => {
        const role = el.classList.contains('user') ? 'user'
          : el.classList.contains('error') ? 'error'
          : el.classList.contains('system') ? 'system'
          : 'assistant';
        const content = el.getAttribute('data-content') || el.textContent;
        if (role !== 'system' || !content.startsWith('Process exited')) {
          msgs.push({ role, content });
        }
      });
      vscode.setState({ profiles, messages: msgs });
    }

    // Init: request profiles
    vscode.postMessage({ command: 'checkProfiles' });
  </script>
</body>
</html>
