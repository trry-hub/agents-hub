<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="__CSP__">
  <title>AI Assistant</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="__MAIN_CSS_URI__">
</head>
<body data-locale="__LOCALE__">
  <div class="app-shell">
    <header class="toolbar">
      <div class="toolbar-main">
        <label class="thread-select">
          <span class="sr-only" data-i18n="history.label"></span>
          <select id="threadSelect" name="assistantThread" autocomplete="off" data-i18n-title="history.label"></select>
        </label>
        <label class="provider-native-select" hidden>
          <span class="sr-only" data-i18n="provider.label"></span>
          <select id="providerSelect" name="assistantProvider" autocomplete="off"></select>
        </label>
        <div class="provider-hint" id="providerHint" aria-live="polite"></div>
        <div class="toolbar-actions" role="toolbar" aria-label="Conversation actions" data-i18n-aria="toolbar.actions">
          <button class="tool-button" id="newChatBtn" data-i18n-title="history.newThread" aria-label="New session">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 3v10M3 8h10"/></svg>
          </button>
          <button class="tool-button" id="deleteThreadBtn" data-i18n-title="history.delete" aria-label="Delete current session">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M5.5 5.5v6M8 5.5v6M10.5 5.5v6M3.8 3.8h8.4M6.4 3.8V2.7h3.2v1.1M4.5 3.8l.4 9.5h6.2l.4-9.5"/></svg>
          </button>
        </div>
        <div class="provider-tabs" id="providerTabs" role="tablist" aria-label="Provider tabs" data-i18n-aria="provider.label"></div>
        <button class="tool-button toolbar-refresh" id="refreshBtn" data-i18n-title="action.refresh" aria-label="Refresh">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M13 8a5 5 0 1 1-1.5-3.6M13 2.8V6h-3.2"/></svg>
        </button>
      </div>
    </header>

    <main class="messages" id="messages" aria-live="polite"></main>

    <footer class="composer">
      <section id="taskBoard" class="task-board" aria-live="polite" data-i18n-aria="taskBoard.label" hidden></section>
      <div class="claude-terminal-banner" id="claudeTerminalBanner" role="note" hidden>
        <svg class="claude-terminal-icon" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M2.8 4.2h10.4v7.6H2.8z"/>
          <path d="M5 6.2l2 1.8-2 1.8M8 10h3"/>
        </svg>
        <span data-i18n="claude.terminalPreference"></span>
        <button class="claude-terminal-dismiss" id="claudeTerminalDismiss" type="button" aria-label="Dismiss" data-i18n-title="action.dismiss">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8"/></svg>
        </button>
      </div>
      <div class="codex-terminal-banner" id="codexTerminalBanner" role="status" hidden>
        <div class="codex-terminal-status">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M2.8 4.2h10.4v7.6H2.8z"/>
            <path d="M5 6.3 6.8 8 5 9.7M8 10h3"/>
          </svg>
          <span data-i18n="codex.terminalRunning"></span>
        </div>
        <div class="codex-terminal-actions">
          <button class="codex-terminal-stop" id="codexTerminalStop" type="button" aria-label="Stop" data-i18n-title="action.stop">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6 6h4v4H6z"/></svg>
          </button>
          <button class="codex-terminal-open" id="codexTerminalOpen" type="button" aria-label="Details" data-i18n-title="codex.terminalDetails">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6.5 4.5 10 8l-3.5 3.5"/></svg>
          </button>
        </div>
      </div>
      <div class="prompt-shell">
        <div class="slash-palette" id="slashPalette" role="listbox" aria-label="Slash commands" data-i18n-aria="slash.label" hidden></div>
        <textarea id="promptInput" name="assistantPrompt" autocomplete="off" rows="1" data-i18n-placeholder="input.placeholder"></textarea>
        <div class="attachment-strip" id="attachmentStrip" aria-live="polite" data-i18n-aria="attachment.label" hidden></div>

        <div class="prompt-actions">
          <div class="prompt-selectors">
            <button class="attach-button" id="attachImageBtn" type="button" data-i18n-title="attachment.add" aria-label="Attach image">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 3v10M3 8h10"/></svg>
            </button>
            <button class="claude-tool-button" id="claudeContextBtn" type="button" data-i18n-title="context.label" aria-label="Attached context">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <rect x="3.2" y="3" width="9.6" height="10" rx="1.4"/>
                <path d="M5.4 10.6 10.7 5.3M6 5.3h4.7v4.7"/>
              </svg>
            </button>
            <input id="imageFileInput" type="file" accept="image/*" multiple hidden>
            <div class="composer-meta">
              <div class="context-budget" id="contextBudget" tabindex="0" role="status" aria-live="polite" data-i18n-aria="contextWindow.label" hidden>
                <span class="context-budget-ring" aria-hidden="true"></span>
                <span id="contextBudgetLabel"></span>
                <div class="context-budget-popover" role="tooltip">
                  <div class="context-budget-title" data-i18n="contextWindow.title"></div>
                  <div id="contextBudgetPercent"></div>
                  <div id="contextBudgetTokens"></div>
                  <div id="contextBudgetTokenizer"></div>
                  <div id="contextBudgetPolicy"></div>
                </div>
              </div>
            </div>
            <details class="option-menu model-menu">
              <summary class="option-summary" data-i18n-title="model.label">
                <span id="modelSummaryLabel"></span>
              </summary>
              <div class="option-popover option-popover-single" aria-label="Model" data-i18n-aria="model.label">
                <label class="select-field agent-select native-option-field">
                  <span class="sr-only" data-i18n="model.label"></span>
                  <select id="modelSelect" name="assistantModel" autocomplete="off"></select>
                </label>
                <div class="option-list model-option-list" id="modelOptionList" role="menu"></div>
                <label class="custom-model-field" id="customModelField" hidden>
                  <span class="sr-only" data-i18n="model.custom"></span>
                  <input id="customModelInput" name="assistantCustomModel" autocomplete="off" spellcheck="false" data-i18n-placeholder="model.customPlaceholder">
                </label>
              </div>
            </details>
            <details class="option-menu permission-menu">
              <summary class="option-summary" data-i18n-title="permission.label">
                <svg class="claude-permission-icon" viewBox="0 0 16 16" aria-hidden="true">
                  <path d="M6.2 8.2V3.8a1 1 0 0 1 2 0v3.7M8.2 7.5V3.1a1 1 0 0 1 2 0v4.7M10.2 8V4.4a1 1 0 1 1 2 0v5.3c0 2.3-1.8 4-4.1 4H7a3.5 3.5 0 0 1-2.8-1.4L2.5 10a1.1 1.1 0 0 1 1.6-1.5l1.2 1.2V5a1 1 0 0 1 2 0v3.2"/>
                </svg>
                <span id="permissionSummaryLabel"></span>
              </summary>
              <div class="option-popover option-popover-single" aria-label="Permission" data-i18n-aria="permission.label">
                <label class="select-field agent-select native-option-field">
                  <span class="sr-only" data-i18n="permission.label"></span>
                  <select id="permissionSelect" name="assistantPermission" autocomplete="off"></select>
                </label>
                <div class="option-list permission-option-list" id="permissionOptionList" role="menu"></div>
              </div>
            </details>
            <details class="mode-menu">
              <summary class="mode-summary" data-i18n-title="agentMode.label">
                <span id="agentModeSummaryLabel"></span>
              </summary>
              <div class="mode-popover option-popover-single" aria-label="Provider agent" data-i18n-aria="agentMode.label">
                <label class="select-field agent-select native-option-field">
                  <span class="sr-only" data-i18n="agentMode.label"></span>
                  <select id="agentModeSelect" name="assistantAgentMode" autocomplete="off"></select>
                </label>
                <div class="option-list mode-option-list" id="agentModeOptionList" role="menu"></div>
              </div>
            </details>
            <select id="actionSelect" name="assistantAction" autocomplete="off" hidden>
              <option value="freeform" data-i18n="action.freeform"></option>
              <option value="explainSelection" data-i18n="action.explainSelection"></option>
              <option value="reviewFile" data-i18n="action.reviewFile"></option>
              <option value="generateTests" data-i18n="action.generateTests"></option>
              <option value="refactorSelection" data-i18n="action.refactorSelection"></option>
            </select>
          </div>

          <div class="prompt-tools" role="toolbar" aria-label="Quick actions" data-i18n-aria="quick.label">
            <button class="stop-button" id="stopBtn" data-i18n-title="action.stop" aria-label="Stop">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M5 5h6v6H5z"/></svg>
            </button>
            <button class="send-button" id="sendBtn" data-i18n-title="action.send" aria-label="Send">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 8h9M9 4l4 4-4 4"/></svg>
            </button>
          </div>
        </div>

        <div class="context-row">
          <details class="context-menu">
            <summary class="context-summary" data-i18n-title="context.label">
              <span class="chip-prefix">@</span><span id="contextSummaryLabel" data-i18n="context.short"></span>
            </summary>
            <div class="context-popover" aria-label="Context" data-i18n-aria="context.label">
              <label class="context-chip">
                <input type="checkbox" data-context="includeWorkspace" checked>
                <span class="chip-prefix">@</span><span data-i18n="context.workspace"></span>
              </label>
              <label class="context-chip">
                <input type="checkbox" data-context="includeCurrentFile" checked>
                <span class="chip-prefix">@</span><span data-i18n="context.file"></span>
              </label>
              <label class="context-chip">
                <input type="checkbox" data-context="includeSelection" checked>
                <span class="chip-prefix">@</span><span data-i18n="context.selection"></span>
              </label>
              <label class="context-chip">
                <input type="checkbox" data-context="includeDiagnostics" checked>
                <span class="chip-prefix">@</span><span data-i18n="context.problems"></span>
              </label>
            </div>
          </details>
        </div>
      </div>

      <div class="composer-footer">
        <div class="composer-runtime" data-i18n-aria="runtime.label" aria-label="Runtime">
          <details class="option-menu runtime-menu">
            <summary class="option-summary" data-i18n-title="runtime.label">
              <span id="runtimeSummaryLabel"></span>
            </summary>
            <div class="option-popover option-popover-single" aria-label="Runtime" data-i18n-aria="runtime.label">
              <label class="select-field agent-select native-option-field">
                <span class="sr-only" data-i18n="runtime.label"></span>
                <select id="runtimeSelect" name="assistantRuntime" autocomplete="off"></select>
              </label>
              <div class="option-list runtime-option-list" id="runtimeOptionList" role="menu"></div>
            </div>
          </details>
        </div>
      </div>
    </footer>
  </div>

  <script nonce="__NONCE__" src="__I18N_JS_URI__"></script>
  <script nonce="__NONCE__" src="__MAIN_JS_URI__"></script>
</body>
</html>
